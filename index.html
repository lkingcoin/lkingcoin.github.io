<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LION KING ($LKING) — The True King of Memecoins on BSC</title>
    <style>
        :root {
            --gold: #ffbd59;
            --dark-gold: #b37d14;
            --bg-dark: #070707;
            --card-bg: rgba(26, 26, 26, 0.65);
            --text-light: #ffffff;
            --text-gray: #b3b3b3;
            --glow: rgba(255, 189, 89, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(7, 7, 7, 0.85);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 189, 89, 0.15);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--gold);
            box-shadow: 0 0 10px var(--glow);
        }

        .logo-text {
            font-size: 22px;
            font-weight: bold;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--glow);
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        .nav-links a {
            color: var(--text-light);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s, text-shadow 0.3s;
        }

        .nav-links a:hover {
            color: var(--gold);
            text-shadow: 0 0 8px var(--glow);
        }

        .btn-buy {
            background: linear-gradient(45deg, var(--gold), var(--dark-gold));
            color: #000;
            padding: 12px 30px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.3s, box-shadow 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-buy:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 189, 89, 0.5);
        }

        /* Hero Section with Fullscreen Background Banner */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 60px 20px;
            position: relative;
            background-image: linear-gradient(to bottom, rgba(7, 7, 7, 0.5), rgba(7, 7, 7, 0.95)), url('baner2.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero-badge {
            background: rgba(255, 189, 89, 0.1);
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 25px;
            letter-spacing: 2px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(255, 189, 89, 0.1);
        }

        .hero h1 {
            font-size: 72px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            background: linear-gradient(to right, #ffffff, var(--gold), #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }

        .hero p {
            font-size: 22px;
            color: var(--text-light);
            max-width: 650px;
            margin-bottom: 45px;
            line-height: 1.6;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .network-badge {

            color: #000;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        .ca-container {

            border: 1px solid rgba(255, 189, 89, 0.3);
            padding: 15px 25px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 15px;
            max-width: 680px;
            width: 100%;
            justify-content: space-between;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .ca-text {

            color: var(--gold);
            font-size: 15px;
            font-weight: bold;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-copy {

            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .btn-copy:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 10px rgba(255, 189, 89, 0.4);
        }

        .section {

            text-align: center;
            position: relative;
        }

        .section-title {
            font-size: 44px;
            text-transform: uppercase;
            margin-bottom: 60px;
            letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #ddd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 20px auto 0;
            border-radius: 2px;
            box-shadow: 0 0 8px var(--gold);
        }

        .about-text {
            font-size: 20px;
            color: var(--text-gray);
            max-width: 850px;
            margin: 0 auto;
            line-height: 1.9;
        }

            margin-top: 20px;

            padding: 45px 30px;
            border-radius: 24px;
            border: 1px solid rgba(255, 189, 89, 0.1);
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);

        .token-card:hover {

            border-color: rgba(255, 189, 89, 0.4);
            box-shadow: 0 15px 35px rgba(255, 189, 89, 0.15);

        .token-card .icon {
            font-size: 36px;
            margin-bottom: 15px;
            display: block;
        }

        .token-card h3 {
            font-size: 16px;
            color: var(--text-gray);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .token-card p {
            font-size: 30px;
            font-weight: 800;
            color: var(--gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);

        .roadmap-step:hover {

            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 10px var(--gold);
        }
